# IMS Production Overlay
# Usage: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d

services:
  node-red:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  grafana:
    environment:
      - GF_LOG_LEVEL=warn
      - GF_PANELS_DISABLE_SANITIZE_HTML=false
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  timescaledb:
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  prometheus:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
