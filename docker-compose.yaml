# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# IMS — Industrial NOC Monitoring System
# Phase 2: Zero-Risk Architecture with PgBouncer + Secrets
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

x-resource-small: &resource-small
  cpus: '0.5'
  memory: 256M

x-resource-medium: &resource-medium
  cpus: '1.0'
  memory: 1G

x-resource-large: &resource-large
  cpus: '2.0'
  memory: 2G

services:
  # ── TimescaleDB ───────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: ims-timescaledb
    <<: *default-restart
    init: true
    environment:
      TZ: ${TZ:-Asia/Bangkok}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_stat_statements
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=1GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - timezone=${TZ:-Asia/Bangkok}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits: *resource-large
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      <<: *healthcheck-defaults
    networks:
      - ims-internal
    logging: *default-logging

  # ── PgBouncer (Connection Pooler) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ims-pgbouncer
    <<: *default-restart
    init: true
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 300
      CLIENT_IDLE_TIMEOUT: 300
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      AUTH_TYPE: plain
    deploy:
      resources:
        limits: *resource-small
        reservations:
          cpus: '0.1'
          memory: 64M
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - ims-internal
    logging: *default-logging

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ims-prometheus
    <<: *default-restart
    init: true
    user: "nobody:nobody"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits: *resource-medium
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      alertmanager:
        condition: service_started
    networks:
      - ims-internal
      - ims-monitoring
    logging: *default-logging

  # ── Alertmanager ──────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ims-alertmanager
    <<: *default-restart
    init: true
    user: "nobody:nobody"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=${ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    deploy:
      resources:
        limits: *resource-small
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - ims-internal
      - ims-monitoring
    logging: *default-logging

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: ims-grafana
    <<: *default-restart
    init: true
    user: "472:472"
    environment:
      TZ: ${TZ:-Asia/Bangkok}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ims-noc-overview.json
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "false"
      GF_LOG_LEVEL: "info"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits: *resource-medium
        reservations:
          cpus: '0.25'
          memory: 128M
    depends_on:
      timescaledb:
        condition: service_healthy
      prometheus:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - ims-internal
      - ims-monitoring
    logging: *default-logging

  # ── SNMP Simulator ────────────────────────────────────────
  snmpsim:
    image: tandrup/snmpsim:latest
    container_name: ims-snmpsim
    <<: *default-restart
    init: true
    entrypoint: ["python", "/usr/local/bin/snmpsimd.py"]
    command:
      - --data-dir=/data
      - --agent-udpv4-endpoint=0.0.0.0:161
      - --force-index-rebuild
      - --process-user=nobody
      - --process-group=nogroup
    volumes:
      - ./monitoring/snmpsim:/data:ro
    deploy:
      resources:
        limits: *resource-small
        reservations:
          cpus: '0.1'
          memory: 32M
    networks:
      - ims-internal
    logging: *default-logging

  # ── Blackbox Exporter (Uptime/SLA Probes) ─────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: ims-blackbox
    <<: *default-restart
    init: true
    user: root
    cap_add:
      - NET_RAW
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "127.0.0.1:9115:9115"
    deploy:
      resources:
        limits: *resource-small
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - ims-internal
      - ims-monitoring
    logging: *default-logging

  # ── Node-RED ──────────────────────────────────────────────
  node-red:
    build:
      context: .
      dockerfile: node-red/Dockerfile
    container_name: ims-node-red
    <<: *default-restart
    init: true
    user: "1000:1000"
    environment:
      TZ: ${TZ:-Asia/Bangkok}
      NODE_RED_ENABLE_PROJECTS: "false"
      NODE_OPTIONS: "--max-old-space-size=2048"
      CREDENTIAL_SECRET: ${NODE_RED_CREDENTIAL_SECRET:?set NODE_RED_CREDENTIAL_SECRET in .env}
      NODE_RED_ADMIN_USER: ${NODE_RED_ADMIN_USER:-admin}
      NODE_RED_ADMIN_PASSWORD_HASH: ${NODE_RED_ADMIN_PASSWORD_HASH:-}
      PGHOST: pgbouncer
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:1880:1880"
    volumes:
      - ./nodered_data:/data
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits: *resource-large
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const http=require('http');const req=http.get('http://127.0.0.1:1880/',res=>process.exit(res.statusCode&&res.statusCode<500?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1);});"
      <<: *healthcheck-defaults
      start_period: 45s
    depends_on:
      timescaledb:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - ims-internal
    logging: *default-logging

volumes:
  timescaledb_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ims-internal:
    driver: bridge
  ims-monitoring:
    driver: bridge
