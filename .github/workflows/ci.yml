name: IMS World-Class CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed .env for validation
        run: cp .env.example .env

      - name: Create secret stubs for compose validation
        run: |
          mkdir -p secrets
          echo "placeholder" > secrets/postgres_password.txt
          echo "placeholder" > secrets/grafana_admin_password.txt

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Lint Prometheus Config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v ${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml

      - name: Lint Prometheus Alert Rules
        run: |
          for f in monitoring/prometheus/rules/*.yml; do
            echo "Checking $f"
            docker run --rm \
              --entrypoint promtool \
              -v "${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules" \
              prom/prometheus:v2.55.1 \
              check rules "/etc/prometheus/rules/$(basename $f)"
          done

      - name: Validate Dashboard JSON
        run: |
          for f in monitoring/grafana/dashboards/*.json; do
            echo "Validating $f"
            python3 -c "import json; json.load(open('$f'))"
          done

      - name: Validate Node-RED Flow JSON
        run: |
          python3 -c "import json; f=json.load(open('flows-ubuntu.json')); print(f'Source flow valid: {len(f)} nodes')"
          if [ -f nodered_data/flows.json ]; then
            python3 -c "import json; f=json.load(open('nodered_data/flows.json')); print(f'Runtime flow valid: {len(f)} nodes')"
          else
            echo "Runtime flow not found (gitignored) — skipping"
          fi

      - name: Secret Scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose \
            --config=/repo/.gitleaks.toml --exit-code 1


