name: IMS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODERED_URL: http://127.0.0.1:1880
  INGEST_API_KEY: ims-secret-key
  GRAFANA_USER: admin
  GRAFANA_PASS: admin

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 1: Lint & Static Analysis
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          docker compose config -q

      - name: Lint Grafana Dashboards
        run: node tests/lint/dashboard-linter.js

      - name: Lint Prometheus Config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v ${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml

      - name: Lint Prometheus Alert Rules
        run: |
          for f in monitoring/prometheus/rules/*.yml; do
            docker run --rm \
              --entrypoint promtool \
              -v "${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules" \
              prom/prometheus:v2.55.1 \
              check rules "/etc/prometheus/rules/$(basename $f)"
          done

      - name: Validate Node-RED Flow JSON
        run: |
          for f in nodered_data/flows/*.json; do
            python3 -c "import json; f=json.load(open('$f')); print(f'VALID: {len(f)} nodes')"
          done

      - name: Secret Scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose \
            --config=/repo/.gitleaks.toml --exit-code 1 || true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 2: Unit Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Parser Tests
        run: node tests/unit/parser.test.js

      - name: Run V2 Parser Tests (Chaos & Boundary)
        run: node tests/unit/v2-parser.test.js

      - name: Run Counter Wraparound Tests
        run: node tests/unit/counter-wraparound.test.js

      - name: Run Boundary Validation Tests
        run: node tests/unit/boundary-validation.test.js

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 3: Integration & Chaos Test
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  integration-chaos:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Seed environment
        run: cp .env.example .env

      - name: Build and start minimal stack
        run: |
          docker compose build node-red
          docker compose up -d timescaledb node-red
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Verify Node-RED is running
        run: |
          curl -sf http://127.0.0.1:1880/ || (echo "Node-RED not ready"; docker logs ims-node-red; exit 1)
          echo "Node-RED: OK"

      - name: Verify TimescaleDB is running
        run: |
          docker exec ims-timescaledb pg_isready -U ims_admin -d ims || (echo "TimescaleDB not ready"; exit 1)
          echo "TimescaleDB: OK"

      - name: Run E2E Smoke Test
        run: bash tests/smoke/db-write-check.sh

      - name: Run Chaos Stress Test (K6)
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/tests/k6:/scripts \
            grafana/k6:latest run \
            --vus 50 \
            --duration 2m \
            -e NODERED_URL=http://127.0.0.1:1880 \
            -e INGEST_API_KEY=ims-secret-key \
            /scripts/chaos-stress.js \
            --summary-export=/scripts/chaos-ci-results.json || true

      - name: Upload chaos results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-stress-results
          path: tests/k6/chaos-ci-results.json
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 4: Summary
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  summary:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-chaos]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "## IMS CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Static Analysis | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration & Chaos | ${{ needs.integration-chaos.result == 'success' && '✅ Pass' || '⚠️ Partial' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by IMS CI/CD Pipeline*" >> $GITHUB_STEP_SUMMARY
