name: IMS World-Class CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Seed .env for validation
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Build Node-RED image
        run: docker compose build node-red

      - name: Smoke test Node-RED boot
        run: |
          docker compose up -d timescaledb node-red
          sleep 25
          docker logs ims-node-red 2>&1 | grep -q "Started flows" || (docker logs ims-node-red; exit 1)

      - name: Lint Prometheus Config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v ${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml

      - name: Lint Prometheus Alert Rules
        run: |
          for f in monitoring/prometheus/rules/*.yml; do
            echo "Checking $f"
            docker run --rm \
              --entrypoint promtool \
              -v "${{ github.workspace }}/monitoring/prometheus/rules:/etc/prometheus/rules" \
              prom/prometheus:v2.55.1 \
              check rules "/etc/prometheus/rules/$(basename $f)"
          done

      - name: Lint Grafana Dashboards
        run: node tests/lint/dashboard-linter.js

      - name: Run Unit Tests
        run: |
          node tests/unit/boundary-validation.test.js
          node tests/unit/parser.test.js
          node tests/unit/counter-wraparound.test.js

      - name: Validate Node-RED Flow JSON
        run: |
          for f in nodered_data/flows/*.json; do
            echo "Checking $f"
            python3 -c "import json; f=json.load(open('$f')); print(f'VALID: {len(f)} nodes')"
          done

      - name: Secret Scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose \
            --config=/repo/.gitleaks.toml --exit-code 1

      - name: Run E2E Smoke Test
        run: bash tests/smoke/db-write-check.sh


