apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb
    type: postgres
    access: proxy
    url: ims-pgbouncer:5432
    database: ims
    user: ${GRAFANA_DB_USER:-grafana_reader}
    secureJsonData:
      password: ${GRAFANA_DB_PASSWORD:-grafana_secure}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
      maxOpenConns: 20
      maxIdleConns: 5
      connMaxLifetime: 14400
