apiVersion: 1
deleteDatasources:
  - name: TimescaleDB
    orgId: 1
datasources:
  - name: TimescaleDB
    uid: timescaledb
    type: postgres
    access: proxy
    url: ims-timescaledb:5432
    database: ims
    user: grafana_reader
    secureJsonData:
      password: grafana_secure
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
      maxOpenConns: 20
      maxIdleConns: 5
      connMaxLifetime: 14400
