# LDI Alert Rules — Enterprise Manufacturing Intelligence
# Rule 1: Quality Drift (max_pe > pe_setting)
# Rule 2: Process Capability (Cpk < 1.33)

apiVersion: 1

groups:
  - orgId: 1
    name: LDI Quality Alerts
    folder: IMS
    interval: 5m
    rules:
      - uid: ldi-quality-drift-001
        title: "LDI Quality Drift — Max PE exceeds tolerance"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                WITH bucketed AS (
                  SELECT time_bucket('5 minutes', time) AS bucket,
                         eqp_id,
                         MAX(GREATEST(ABS(pe_1), ABS(pe_2), ABS(pe_3),
                             ABS(pe_4), ABS(pe_5), ABS(pe_6))) AS max_pe,
                         MAX(pe_setting) AS pe_setting
                  FROM public.ldi_data
                  WHERE time >= NOW() - INTERVAL '10 minutes'
                    AND pe_1 IS NOT NULL
                  GROUP BY 1, 2
                )
                SELECT bucket AS time, eqp_id AS metric,
                       max_pe AS value
                FROM bucketed
                WHERE max_pe > pe_setting
                ORDER BY 1
              format: time_series
              intervalMs: 300000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: count
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        annotations:
          summary: "Machine {{ $labels.eqp_id }} PE deviation ({{ $values.A }}) exceeds tolerance"
          description: "Registration error exceeds pe_setting threshold. Immediate inspection required."
        labels:
          severity: critical
          team: manufacturing
          category: quality

      - uid: ldi-process-capability-002
        title: "LDI Process Capability — Cpk below 1.33"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT NOW() AS time, eqp_id AS metric,
                       cpk AS value
                FROM public.v_machine_spc_ranking
                WHERE cpk < 1.33
              format: time_series
              intervalMs: 300000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: count
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        annotations:
          summary: "Machine {{ $labels.eqp_id }} Cpk={{ $values.A }} below capable threshold"
          description: "Process capability index has fallen below 1.33. Process is no longer capable."
        labels:
          severity: warning
          team: manufacturing
          category: spc

      - uid: ldi-je-drift-003
        title: "LDI Quality Drift — Max JE exceeds tolerance"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                WITH bucketed AS (
                  SELECT time_bucket('5 minutes', time) AS bucket,
                         eqp_id,
                         MAX(GREATEST(ABS(je_1), ABS(je_2),
                             ABS(je_3), ABS(je_4))) AS max_je,
                         MAX(je_setting) AS je_setting
                  FROM public.ldi_data
                  WHERE time >= NOW() - INTERVAL '10 minutes'
                    AND je_1 IS NOT NULL
                  GROUP BY 1, 2
                )
                SELECT bucket AS time, eqp_id AS metric,
                       max_je AS value
                FROM bucketed
                WHERE max_je > je_setting
                ORDER BY 1
              format: time_series
              intervalMs: 300000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: count
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        annotations:
          summary: "Machine {{ $labels.eqp_id }} JE deviation ({{ $values.A }}) exceeds tolerance"
          description: "Joining error exceeds je_setting threshold. Alignment check required."
        labels:
          severity: critical
          team: manufacturing
          category: quality

      - uid: ldi-je-capability-004
        title: "LDI JE Process Capability — Cpk below 1.33"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT NOW() AS time, eqp_id AS metric,
                       cpk_je AS value
                FROM public.v_machine_spc_ranking
                WHERE cpk_je IS NOT NULL AND cpk_je < 1.33
              format: time_series
              intervalMs: 300000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: count
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        annotations:
          summary: "Machine {{ $labels.eqp_id }} JE Cpk={{ $values.A }} below capable threshold"
          description: "JE process capability index has fallen below 1.33."
        labels:
          severity: warning
          team: manufacturing
          category: spc

      - uid: ldi-machine-alarm-005
        title: "LDI Machine Alarm — new alarm in database"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT logdate AS time, equipmentid AS metric, 1 AS value
                FROM public.ldi_alarm_log
                WHERE logdate >= NOW() - INTERVAL '5 minutes'
              format: time_series
              intervalMs: 300000
              maxDataPoints: 100
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: count
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 0m
        annotations:
          summary: "Machine {{ $labels.eqp_id }} raised alarm in last 5 minutes"
          description: "New alarm entry detected in ldi_alarm_log. Check machine status."
        labels:
          severity: warning
          team: manufacturing
          category: alarm