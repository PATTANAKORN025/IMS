apiVersion: 1

# Root notification policy: this Grafana instance serves IMS only, so route all
# managed alerts to the Node-RED webhook contact point. Group by alertname +
# machine so per-host alerts are batched.
policies:
  - orgId: 1
    receiver: ims-node-red-webhook
    group_by:
      - alertname
      - machine_id
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 3h
