apiVersion: 1

# Telemetry alerting engine = Grafana-managed SQL over the TimescaleDB base tables
# Prometheus/Alertmanager is reserved for blackbox SLA + up/self-monitoring only.
groups:
  - orgId: 1
    name: IMS Infrastructure
    folder: IMS
    interval: 1m
    rules:
      - uid: ims-cpu-high
        title: High CPU Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  AVG(cpu_load_percent) AS value
                FROM sys_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id
                HAVING AVG(cpu_load_percent) > 85
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85% on {{ $labels.metric }}"
          description: "Average CPU load is {{ $values.A.Value }}%"

      - uid: ims-ram-high
        title: High RAM Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  AVG(ram_used_mb) / NULLIF(AVG(ram_total_mb), 0) * 100 AS value
                FROM sys_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id
                HAVING AVG(ram_used_mb) / NULLIF(AVG(ram_total_mb), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM usage above 90% on {{ $labels.metric }}"
          description: "Average RAM usage is {{ $values.A.Value }}%"

      - uid: ims-disk-high
        title: High Disk Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  AVG(disk_used_gb) / NULLIF(AVG(disk_total_gb), 0) * 100 AS value
                FROM sys_metrics
                WHERE time > NOW() - INTERVAL '10 minutes'
                GROUP BY device_id
                HAVING AVG(disk_used_gb) / NULLIF(AVG(disk_total_gb), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 90% on {{ $labels.metric }}"
          description: "Average disk usage is {{ $values.A.Value }}%"

      - uid: ims-temp-high
        title: High Temperature
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  MAX(temp_c) AS value
                FROM sys_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id
                HAVING MAX(temp_c) > 80
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Temperature above 80C on {{ $labels.metric }}"
          description: "Max temperature is {{ $values.A.Value }}°C"

      - uid: ims-wifi-snr-low
        title: Wi-Fi SNR Low
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  AVG(wifi_snr) AS value
                FROM ldi_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id
                HAVING AVG(wifi_snr) < 20 AND AVG(wifi_snr) > 0
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          service: wifi
        annotations:
          summary: "Wi-Fi SNR below 20 dB on {{ $labels.metric }}"
          description: "Average SNR is {{ $values.A.Value }} dB (poor signal quality)"

      - uid: ims-bandwidth-saturation-forecast
        title: Bandwidth Saturation Forecast
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  regr_slope(rx_mbps, EXTRACT(EPOCH FROM (time - NOW()))) * 3600
                    + regr_intercept(rx_mbps, EXTRACT(EPOCH FROM (time - NOW()))) AS value
                FROM net_metrics
                WHERE time > NOW() - INTERVAL '30 minutes'
                GROUP BY device_id
                HAVING COUNT(*) >= 5
                   AND regr_slope(rx_mbps, EXTRACT(EPOCH FROM (time - NOW()))) > 0
                   AND regr_slope(rx_mbps, EXTRACT(EPOCH FROM (time - NOW()))) * 3600
                       + regr_intercept(rx_mbps, EXTRACT(EPOCH FROM (time - NOW()))) > 1000
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          service: network
        annotations:
          summary: "Bandwidth trending toward saturation on {{ $labels.metric }}"
          description: "Projected RX in 60 min is {{ $values.A.Value }} Mbps (rising trend, approaching link capacity)"

      - uid: ims-interface-down
        title: Interface Down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id || ' ' || iface_name AS metric,
                  COUNT(*) AS value
                FROM net_metrics
                WHERE time > NOW() - INTERVAL '2 minutes'
                GROUP BY device_id, iface_name
                HAVING COUNT(*) FILTER (WHERE status = 'UP') = 0 AND COUNT(*) FILTER (WHERE status = 'DOWN') > 0
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: network
        annotations:
          summary: "Network interface DOWN on {{ $labels.metric }}"
          description: "Interface status has been down for the full sampling window."

      - uid: ims-network-drops
        title: Network Packet Drops
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id || ' ' || iface_name AS metric,
                  MAX(rx_drops) AS value
                FROM net_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id, iface_name
                HAVING MAX(rx_drops) > 50
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
          service: network
        annotations:
          summary: "High packet drops on {{ $labels.metric }}"
          description: "{{ $values.A.Value }} RX drops in a 1-minute bucket. Congestion or buffer overflow."

      - uid: ims-ldi-vibration-critical
        title: LDI Vibration Critical
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  device_id AS metric,
                  MAX(vibration) AS value
                FROM ldi_metrics
                WHERE time > NOW() - INTERVAL '5 minutes'
                GROUP BY device_id
                HAVING MAX(vibration) > 12
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: ldi
        annotations:
          summary: "LDI Vibration critical on {{ $labels.metric }}"
          description: "Vibration {{ $values.A.Value }} mm/s exceeds safe threshold. Possible bearing failure."
