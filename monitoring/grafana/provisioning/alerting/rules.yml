apiVersion: 1

# Telemetry alerting engine = Grafana-managed SQL over the TimescaleDB continuous
# aggregates (Ironclad Rule 5: never query the raw machine_telemetry table).
# Prometheus/Alertmanager is reserved for blackbox SLA + up/self-monitoring only.
groups:
  - orgId: 1
    name: IMS Infrastructure
    folder: IMS
    interval: 1m
    rules:
      - uid: ims-cpu-high
        title: High CPU Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(avg_cpu_load) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING AVG(avg_cpu_load) > 85
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85% on {{ $labels.machine_id }}"
          description: "Average CPU load is {{ $values.A }}%"

      - uid: ims-ram-high
        title: High RAM Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(avg_ram_used) / NULLIF(AVG(avg_ram_total), 0) * 100 AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING AVG(avg_ram_used) / NULLIF(AVG(avg_ram_total), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM usage above 90% on {{ $labels.machine_id }}"
          description: "Average RAM usage is {{ $values.A }}%"

      - uid: ims-disk-high
        title: High Disk Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(avg_disk_used) / NULLIF(AVG(avg_disk_total), 0) * 100 AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '10 minutes'
                GROUP BY machine_id
                HAVING AVG(avg_disk_used) / NULLIF(AVG(avg_disk_total), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 90% on {{ $labels.machine_id }}"
          description: "Average disk usage is {{ $values.A }}%"

      - uid: ims-temp-high
        title: High Temperature
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MAX(max_temp) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING MAX(max_temp) > 80
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Temperature above 80C on {{ $labels.machine_id }}"
          description: "Max temperature is {{ $values.A }}°C"

      # ── Req5: Wi-Fi signal quality ────────────────────────────────
      # SNR below 20 dB sustained for 5 min. The >0 guard skips machines
      # with no Wi-Fi reading (wifi_snr defaults to 0 for ethernet-only hosts).
      - uid: ims-wifi-snr-low
        title: Wi-Fi SNR Low
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(avg_wifi_snr) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING AVG(avg_wifi_snr) < 20 AND AVG(avg_wifi_snr) > 0
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          service: wifi
        annotations:
          summary: "Wi-Fi SNR below 20 dB on {{ $labels.machine_id }}"
          description: "Average SNR is {{ $values.A }} dB (poor signal quality)"

      # ── Req5: Predictive bandwidth-saturation forecast ────────────
      # Linear regression (regr_slope/regr_intercept) over the last 30 min of
      # minute-CA rx_mbps, extrapolated 60 min ahead. Fires when the trend is
      # rising AND the projected value exceeds ~1 Gbps (near the wlan0 link cap),
      # i.e. an EARLY warning before saturation actually occurs.
      - uid: ims-bandwidth-saturation-forecast
        title: Bandwidth Saturation Forecast
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  regr_slope(avg_rx_mbps, EXTRACT(EPOCH FROM (bucket - NOW()))) * 3600
                    + regr_intercept(avg_rx_mbps, EXTRACT(EPOCH FROM (bucket - NOW()))) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '30 minutes'
                GROUP BY machine_id
                HAVING COUNT(*) >= 5
                   AND regr_slope(avg_rx_mbps, EXTRACT(EPOCH FROM (bucket - NOW()))) > 0
                   AND regr_slope(avg_rx_mbps, EXTRACT(EPOCH FROM (bucket - NOW()))) * 3600
                       + regr_intercept(avg_rx_mbps, EXTRACT(EPOCH FROM (bucket - NOW()))) > 1000
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          service: network
        annotations:
          summary: "Bandwidth trending toward saturation on {{ $labels.machine_id }}"
          description: "Projected RX in 60 min is {{ $values.A }} Mbps (rising trend, approaching link capacity)"

      # ── Network: interface down (sustained the full bucket) ───────
      - uid: ims-interface-down
        title: Interface Down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MIN(min_if_status) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '2 minutes'
                GROUP BY machine_id
                HAVING MIN(min_if_status) >= 2
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: network
        annotations:
          summary: "Network interface DOWN on {{ $labels.machine_id }}"
          description: "Interface status has been down for the full sampling window."

      - uid: ims-network-drops
        title: Network Packet Drops
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MAX(total_rx_drops) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING MAX(total_rx_drops) > 50
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
          service: network
        annotations:
          summary: "High packet drops on {{ $labels.machine_id }}"
          description: "{{ $values.A }} RX drops in a 1-minute bucket. Congestion or buffer overflow."

      # ── LDI manufacturing: hard-threshold critical alerts ─────────
      # (>0 guard skips non-LDI hosts where ldi_* defaults to 0)
      - uid: ims-ldi-pe-critical
        title: LDI Process Efficiency Critical
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MIN(min_ldi_pe) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING MIN(min_ldi_pe) < 50 AND MIN(min_ldi_pe) > 0
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: ldi
        annotations:
          summary: "LDI Process Efficiency critical on {{ $labels.machine_id }}"
          description: "PE dropped to {{ $values.A }}%. Immediate inspection required."

      - uid: ims-ldi-vibration-critical
        title: LDI Vibration Critical
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MAX(max_ldi_vibration) AS value
                FROM telemetry_minute_summary
                WHERE bucket > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING MAX(max_ldi_vibration) > 12
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: ldi
        annotations:
          summary: "LDI Vibration critical on {{ $labels.machine_id }}"
          description: "Vibration {{ $values.A }} mm/s exceeds safe threshold. Possible bearing failure."
