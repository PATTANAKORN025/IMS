apiVersion: 1

groups:
  - orgId: 1
    name: IMS Infrastructure
    folder: IMS
    interval: 1m
    rules:
      - uid: ims-cpu-high
        title: High CPU Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(cpu_load_percent) AS value
                FROM public.machine_telemetry
                WHERE "time" > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING AVG(cpu_load_percent) > 85
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85% on {{ $labels.machine_id }}"
          description: "Average CPU load is {{ $values.A }}%"

      - uid: ims-ram-high
        title: High RAM Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(ram_used_mb) / NULLIF(AVG(ram_total_mb), 0) * 100 AS value
                FROM public.machine_telemetry
                WHERE "time" > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING AVG(ram_used_mb) / NULLIF(AVG(ram_total_mb), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM usage above 90% on {{ $labels.machine_id }}"
          description: "Average RAM usage is {{ $values.A }}%"

      - uid: ims-disk-high
        title: High Disk Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  AVG(disk_used_gb) / NULLIF(AVG(disk_total_gb), 0) * 100 AS value
                FROM public.machine_telemetry
                WHERE "time" > NOW() - INTERVAL '10 minutes'
                GROUP BY machine_id
                HAVING AVG(disk_used_gb) / NULLIF(AVG(disk_total_gb), 0) * 100 > 90
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 90% on {{ $labels.machine_id }}"
          description: "Average disk usage is {{ $values.A }}%"

      - uid: ims-temp-high
        title: High Temperature
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: timescaledb
            model:
              rawSql: |
                SELECT
                  machine_id AS metric,
                  MAX(temperature_c) AS value
                FROM public.machine_telemetry
                WHERE "time" > NOW() - INTERVAL '5 minutes'
                GROUP BY machine_id
                HAVING MAX(temperature_c) > 80
              format: time_series
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Temperature above 80C on {{ $labels.machine_id }}"
          description: "Max temperature is {{ $values.A }}°C"
