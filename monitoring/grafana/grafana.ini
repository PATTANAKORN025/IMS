# IMS Grafana Security Configuration
# Enforces zero-trust dashboard access for NOC screens

[security]
# Prevent XSS via dashboard HTML panels
disable_sanitize_html = false
# Cookie security
cookie_secure = false
cookie_samesite = lax
# Allow embedding in iframe if needed for NOC wallboards
allow_embedding = true

[users]
# Disable user registration (all users provisioned via env vars)
allow_sign_up = false
# Default role for new users
default_theme = dark

[auth.anonymous]
# Disable anonymous access (force authentication)
enabled = false

[users.default_theme]
# Force dark theme for all users
dark = dark

[panels]
# Disable value mapping escape (panels render HTML safely)
disable_sanitize_html = false

[dashboards]
# Default home dashboard
default_home_dashboard_path = /var/lib/grafana/dashboards/ims-noc-overview.json

[explore]
# Disable Explore for non-admin users (prevent SQL injection)
enabled = true

[unified_alerting]
# Enable unified alerting
enabled = true

[log]
# Production logging level
level = warn
mode = console
filters = rendering:debug
