# IMS Grafana Security Configuration
# Zero-Trust Dashboard Access for NOC Screens

[security]
disable_sanitize_html = false
cookie_secure = false
cookie_samesite = lax
allow_embedding = true
# Hide Grafana version from footer
hide_version = true

[users]
allow_sign_up = false
default_theme = dark
# Viewers cannot edit dashboards
viewers_can_edit = false

[auth.anonymous]
enabled = false

[panels]
disable_sanitize_html = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/ims-noc-overview.json

[explore]
# Disable Explore for non-admin users (prevent SQL injection)
enabled = false

[plugins]
# Disable unsigned plugin loading
allow_loading_unsigned_plugins = []
# Prevent plugin installation via UI
hide_new_plugins = true

[unified_alerting]
enabled = true

[log]
level = warn
mode = console
