# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# IMS Prometheus Alert Rules
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SCOPE: Prometheus only alerts on metrics it actually scrapes — `up` (self,
# alertmanager, blackbox jobs), Prometheus self-metrics, and blackbox `probe_*`
# SLA probes (see monitoring/prometheus/prometheus.yml).
#
# ALL telemetry alerting (CPU/RAM/disk/temp, Wi-Fi SNR, network drops/interface,
# LDI manufacturing, predictive bandwidth) lives in Grafana-managed SQL alerts
# over the TimescaleDB continuous aggregates — see
# monitoring/grafana/provisioning/alerting/rules.yml. Those metrics are NOT
# exported to Prometheus (no node-red /metrics, no postgres/snmp exporter), so
# alerting on them here would produce permanently-inert rules. Node-RED and the
# DB are still covered for liveness by the blackbox `ServiceDown` probe below.
#
# FOLLOW-UP (tracked, not yet ported to Grafana SQL): z-score anomaly detection
# (bandwidth/temp/cpu), LDI throughput/JE/power 3-sigma, interface flapping,
# network-errors spike, thermal-correlation.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

groups:
  # ── Infrastructure Self-Monitoring (up / Prometheus self-metrics) ─
  - name: infrastructure_health
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          service: prometheus
        annotations:
          summary: "Prometheus is DOWN"

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 1m
        labels:
          severity: critical
          service: alertmanager
        annotations:
          summary: "Alertmanager is DOWN — alerts may be lost"

      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target {{ $labels.instance }} ({{ $labels.job }}) is DOWN"

      - alert: HighScrapeErrors
        expr: rate(prometheus_target_scrapes_exceeded_body_size_limit_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High scrape error rate on {{ $labels.job }}"

  # ── SLA / Uptime Monitoring (Blackbox probe_*) ───────────────────
  # ServiceDown also covers Node-RED, Grafana and the DB liveness — they are
  # blackbox HTTP/TCP targets in prometheus.yml.
  - name: sla_uptime
    rules:
      - alert: ServiceDown
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Service {{ $labels.instance }} is DOWN"
          description: "Probe failed for >1 minute. SLA impact."
          runbook: "Check service health: docker ps | grep {{ $labels.instance }}"

      - alert: ServiceHighLatency
        expr: probe_duration_seconds > 2
        for: 5m
        labels:
          severity: warning
          service: blackbox
        annotations:
          summary: "High latency on {{ $labels.instance }}"
          description: "Response time: {{ $value | humanizeDuration }}"

      - alert: SLABreachWarning
        expr: (1 - avg_over_time(probe_success[1h])) * 100 > 0.01
        for: 5m
        labels:
          severity: warning
          service: blackbox
        annotations:
          summary: "SLA breach risk: {{ $labels.instance }}"
          description: "Uptime dropped below 99.99% in the last hour"

      - alert: SSLCertExpiring
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          service: blackbox
        annotations:
          summary: "SSL cert for {{ $labels.instance }} expires in < 30 days"
          description: "Days remaining: {{ $value | humanizeDuration }}"

  # ── Deadman's Switch (Watchdog) ──────────────────────────────────
  - name: watchdog
    rules:
      - alert: Watchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "IMS Watchdog - monitoring pipeline is alive"
