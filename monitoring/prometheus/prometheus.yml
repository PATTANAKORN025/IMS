# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# IMS Prometheus Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ── Prometheus Self-Monitoring ─────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ── Node-RED Metrics ──────────────────────────────────────
  - job_name: node-red
    metrics_path: /metrics
    static_configs:
      - targets:
          - node-red:1880

  # ── Alertmanager ──────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  # ── Blackbox Exporter — Self-Monitor ──────────────────────
  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox:9115

  # ── Blackbox: HTTP Probes (SLA) ──────────────────────────
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 30s
    static_configs:
      - targets:
          - http://grafana:3000/api/health
          - http://node-red:1880/
          - http://prometheus:9090/-/healthy
          - http://alertmanager:9093/-/healthy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # ── Blackbox: TCP Probes (Port Check) ────────────────────
  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    scrape_interval: 30s
    static_configs:
      - targets:
          - timescaledb:5432
          - pgbouncer:6432
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # ── Blackbox: ICMP Probes (Ping) ─────────────────────────
  - job_name: blackbox-icmp
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 30s
    static_configs:
      - targets:
          - grafana
          - node-red
          - timescaledb
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
