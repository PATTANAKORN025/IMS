global:
  resolve_timeout: 5m

route:
  receiver: 'ims-webhook-default'
  group_by: ['alertname', 'cluster', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    # Watchdog goes to null (deadman's switch)
    - matchers:
        - alertname="Watchdog"
      receiver: 'null'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m
    - matchers:
        - severity="critical"
      receiver: 'ims-slack-critical'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 30m
      continue: true

    - matchers:
        - severity="warning"
      receiver: 'ims-webhook-default'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 2h

    - matchers:
        - severity="info"
      receiver: 'ims-webhook-default'
      group_interval: 30m
      repeat_interval: 24h

receivers:
  - name: 'null'
  - name: 'ims-webhook-default'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'ims-slack-critical'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        channel: '#ims-critical-alerts'
        title: '{{ if eq .Status "firing" }}:rotating_light: [CRITICAL]{{ else }}:white_check_mark: [RESOLVED]{{ end }} {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Machine:* {{ .Labels.machine_id }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .EndsAt }}*Ended:* {{ .EndsAt.Format "2006-01-02 15:04:05" }}{{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        send_resolved: true

  - name: 'ims-deadman'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true

inhibit_rules:
  # A down service (blackbox probe_success==0) suppresses its own latency /
  # SLA-risk warnings for the same instance — no point paging on slowness
  # when the thing is already hard-down.
  - source_matchers:
      - alertname="ServiceDown"
    target_matchers:
      - alertname=~"ServiceHighLatency|SLABreachWarning"
    equal: ['instance']

  # Any critical on an instance suppresses warnings on that same instance.
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['instance']
