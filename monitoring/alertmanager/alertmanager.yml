# IMS Alertmanager Configuration — Phase 1: Alert Fatigue Mitigation
# Grouping by device_id + device_type ensures all anomalies for a single
# machine arrive as ONE notification, not N separate alerts.

global:
  resolve_timeout: 5m

route:
  receiver: 'ims-webhook-default'
  # Group by device identity so all alerts for one machine bundle together
  group_by: ['alertname', 'device_id', 'device_type']
  group_wait: 30s        # Wait 30s to collect initial burst before first notify
  group_interval: 5m     # Don't re-notify same group more than once per 5m
  repeat_interval: 4h    # Re-notify unresolved alerts every 4h (NOC shift handover)
  routes:
    # Watchdog deadman goes to null (standard Prometheus convention)
    - matchers:
        - alertname="Watchdog"
      receiver: 'null'
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m

    # Critical: page immediately, short repeat for awareness
    - matchers:
        - severity="critical"
      receiver: 'ims-slack-critical'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 30m
      continue: true

    # Warning: standard NOC notification
    - matchers:
        - severity="warning"
      receiver: 'ims-webhook-default'
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 2h

    # Info: dashboard-only, minimal notification
    - matchers:
        - severity="info"
      receiver: 'ims-webhook-default'
      group_interval: 30m
      repeat_interval: 24h

receivers:
  - name: 'null'

  - name: 'ims-webhook-default'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'ims-slack-critical'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
        channel: '#ims-critical-alerts'
        title: '{{ if eq .Status "firing" }}:rotating_light: [CRITICAL]{{ else }}:white_check_mark: [RESOLVED]{{ end }} {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Device:* {{ .Labels.device_id }} ({{ .Labels.device_type }})
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ if .EndsAt }}*Ended:* {{ .EndsAt.Format "2006-01-02 15:04:05" }}{{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        send_resolved: true

  - name: 'ims-deadman'
    webhook_configs:
      - url: 'http://node-red:1880/alert-webhook'
        send_resolved: true

inhibit_rules:
  # A down service suppresses its own latency/SLA warnings
  - source_matchers:
      - alertname="ServiceDown"
    target_matchers:
      - alertname=~"ServiceHighLatency|SLABreachWarning"
    equal: ['instance']

  # Any critical on a device suppresses warnings on the same device
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['device_id']

  # Network-down suppresses bandwidth alerts on same device
  - source_matchers:
      - alertname="InterfaceDown"
    target_matchers:
      - alertname="BandwidthSaturation"
    equal: ['device_id']
